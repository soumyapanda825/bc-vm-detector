<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC/VM Call Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container { max-width: 620px; width: 100%; }

    /* Header */
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f0f6ff;
      letter-spacing: -0.02em;
    }
    .header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #6e7681;
    }

    /* Card */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.75rem;
    }

    /* Drop zone */
    .drop-zone {
      position: relative;
      border: 2px dashed #30363d;
      border-radius: 8px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }
    .drop-zone:hover { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
    .drop-zone.drag-over { border-color: #58a6ff; background: rgba(88, 166, 255, 0.08); }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .drop-icon { font-size: 2.2rem; display: block; margin-bottom: 0.75rem; }

    .drop-label {
      font-size: 0.95rem;
      color: #8b949e;
    }
    .drop-label strong { color: #58a6ff; font-weight: 600; }

    .file-selected {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #58a6ff;
      display: none;
    }
    .file-selected svg { flex-shrink: 0; }

    /* Analyze button */
    .analyze-btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.75rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
    }
    .analyze-btn:hover:not(:disabled) { background: #2ea043; }
    .analyze-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    /* Spinner */
    .loading {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
      color: #6e7681;
      font-size: 0.9rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result {
      display: none;
      margin-top: 1.5rem;
      border-radius: 8px;
      border: 1px solid;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
    }

    .result-badge {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .result-desc { font-size: 0.85rem; color: #8b949e; margin-top: 0.2rem; }

    /* Color themes */
    .result.BLANK    { border-color: #d29922; background: rgba(210, 153, 34, 0.06); }
    .result.VOICEMAIL{ border-color: #f85149; background: rgba(248, 81, 73, 0.06); }
    .result.LIVE     { border-color: #3fb950; background: rgba(63, 185, 80, 0.06); }

    .result.BLANK     .result-badge { color: #d29922; }
    .result.VOICEMAIL .result-badge { color: #f85149; }
    .result.LIVE      .result-badge { color: #3fb950; }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #30363d;
      border-top: 1px solid #30363d;
    }
    .stat {
      background: #161b22;
      padding: 0.85rem 1.5rem;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6e7681;
      margin-bottom: 0.2rem;
    }
    .stat-value { font-size: 1.15rem; font-weight: 700; color: #f0f6ff; }

    /* Details table */
    .details {
      border-top: 1px solid #30363d;
    }
    .details-title {
      padding: 0.65rem 1.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6e7681;
      background: #0d1117;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 1.5rem;
      border-top: 1px solid #21262d;
      font-size: 0.83rem;
    }
    .detail-key { color: #8b949e; }
    .detail-val { font-family: 'SFMono-Regular', Consolas, monospace; color: #e6edf3; font-size: 0.8rem; }

    /* Signals chips */
    .signals { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.65rem 1.5rem; border-top: 1px solid #21262d; }
    .chip {
      font-size: 0.7rem;
      padding: 0.2rem 0.55rem;
      border-radius: 2em;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .chip.on  { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .chip.off { background: rgba(110,118,129,0.1); color: #484f58; border: 1px solid #21262d; }

    /* Error */
    .error {
      display: none;
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      border: 1px solid #f85149;
      border-radius: 6px;
      background: rgba(248,81,73,0.08);
      color: #f85149;
      font-size: 0.875rem;
    }

    /* Footer */
    .footer {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: #484f58;
    }
    .footer span { margin: 0 0.3rem; }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Call Type Detector</h1>
    <p>Upload an audio file to identify blank calls and voicemails</p>
  </div>

  <div class="card">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".wav,.flac,.ogg,.mp3,.aiff,.aif" />
      <span class="drop-icon">🎙️</span>
      <div class="drop-label">Drop your audio file here or <strong>click to browse</strong></div>
      <div class="file-selected" id="fileSelected">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><path d="M21 12A9 9 0 1 1 3 12a9 9 0 0 1 18 0z"/></svg>
        <span id="fileSelectedName"></span>
      </div>
    </div>

    <!-- Analyze button -->
    <button class="analyze-btn" id="analyzeBtn" disabled>Analyze Call</button>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Analyzing audio, please wait…
    </div>

    <!-- Result -->
    <div class="result" id="result">
      <div class="result-header">
        <div>
          <div class="result-badge" id="resultBadge"></div>
          <div class="result-desc" id="resultDesc"></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Confidence</div>
          <div class="stat-value" id="resultConfidence">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Detected at</div>
          <div class="stat-value" id="resultTime">—</div>
        </div>
      </div>

      <div class="details" id="details">
        <div class="details-title">Analysis details</div>
        <div id="detailRows"></div>
        <div id="signalChips"></div>
      </div>
    </div>

    <!-- Error -->
    <div class="error" id="error"></div>

  </div><!-- .card -->

  <div class="footer">
    Supported formats:
    <span>WAV</span>·<span>FLAC</span>·<span>OGG</span>·<span>AIFF</span>·<span>MP3*</span>
    &nbsp;|&nbsp; Blank calls detected at ≥ 7 s silence
  </div>

</div><!-- .container -->

<script>
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const fileSelected     = document.getElementById('fileSelected');
  const fileSelectedName = document.getElementById('fileSelectedName');
  const analyzeBtn  = document.getElementById('analyzeBtn');
  const loading     = document.getElementById('loading');
  const resultEl    = document.getElementById('result');
  const errorEl     = document.getElementById('error');

  let selectedFile = null;

  // -------------------------------------------------------------------
  // File selection
  // -------------------------------------------------------------------
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function setFile(file) {
    selectedFile = file;
    fileSelectedName.textContent = file.name + '  (' + fmtSize(file.size) + ')';
    fileSelected.style.display = 'flex';
    analyzeBtn.disabled = false;
    hide(resultEl);
    hide(errorEl);
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  // -------------------------------------------------------------------
  // Analyze
  // -------------------------------------------------------------------
  analyzeBtn.addEventListener('click', analyze);

  async function analyze() {
    if (!selectedFile) return;

    hide(resultEl);
    hide(errorEl);
    analyzeBtn.disabled = true;
    show(loading);

    const form = new FormData();
    form.append('file', selectedFile);

    try {
      const res = await fetch('/analyze', { method: 'POST', body: form });
      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Server error ' + res.status);
      } else {
        renderResult(data);
      }
    } catch (err) {
      showError('Network error: ' + err.message);
    } finally {
      hide(loading);
      analyzeBtn.disabled = false;
    }
  }

  // -------------------------------------------------------------------
  // Render result
  // -------------------------------------------------------------------
  const DESCRIPTIONS = {
    BLANK:     'No meaningful audio detected for ≥ 7 seconds — likely a dropped or silent call.',
    VOICEMAIL: 'Automated voicemail greeting, beep tone, or recorded message detected.',
    LIVE:      'Human speech or activity detected — likely a live caller.',
  };

  function renderResult(data) {
    const type = data.result;
    resultEl.className = 'result ' + type;
    document.getElementById('resultBadge').textContent = type;
    document.getElementById('resultDesc').textContent  = DESCRIPTIONS[type] || '';
    document.getElementById('resultConfidence').textContent =
      (data.confidence * 100).toFixed(1) + '%';
    document.getElementById('resultTime').textContent =
      (data.detected_at_ms / 1000).toFixed(2) + ' s';

    // Detail rows (skip 'signals' — rendered as chips)
    const detailRows = document.getElementById('detailRows');
    detailRows.innerHTML = '';
    const details = data.details || {};
    const LABELS = {
      rms_db:             'RMS energy (dBFS)',
      speech_ratio:       'Speech ratio',
      silence_duration_s: 'Silence duration',
      total_duration_s:   'Total file duration',
      vm_score:           'Voicemail score',
      vm_state:           'Detector state',
      reason:             'Reason',
    };

    for (const [k, v] of Object.entries(details)) {
      if (k === 'signals') continue;
      const row = document.createElement('div');
      row.className = 'detail-row';
      const label = LABELS[k] || k.replace(/_/g, ' ');
      const val   = typeof v === 'number' ? v.toString() : String(v);
      row.innerHTML =
        `<span class="detail-key">${label}</span><span class="detail-val">${val}</span>`;
      detailRows.appendChild(row);
    }

    // Signal chips (voicemail signals map)
    const chipsEl = document.getElementById('signalChips');
    chipsEl.innerHTML = '';
    if (details.signals && typeof details.signals === 'object') {
      const ALL_SIGNALS = ['beep', 'speech_burst', 'flatness', 'zcr_variance', 'greeting_pattern', 'corroboration'];
      for (const sig of ALL_SIGNALS) {
        const on  = !!details.signals[sig];
        const chip = document.createElement('span');
        chip.className = 'chip ' + (on ? 'on' : 'off');
        chip.textContent = sig.replace(/_/g, ' ');
        chipsEl.appendChild(chip);
      }
    }

    show(resultEl);
  }

  // -------------------------------------------------------------------
  // Error display
  // -------------------------------------------------------------------
  function showError(msg) {
    errorEl.textContent = '⚠  ' + msg;
    show(errorEl);
  }

  // -------------------------------------------------------------------
  // Helpers
  // -------------------------------------------------------------------
  function show(el) { el.style.display = ''; }
  function hide(el) { el.style.display = 'none'; }
</script>

</body>
</html>
